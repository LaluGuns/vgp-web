name = "flowstate-audio-delivery"
main = "src/index.js"
compatibility_date = "2026-06-01"

# R2 binding: keys mirror tracks/... and sounds/...
[[r2_buckets]]
binding = "AUDIO_BUCKET"
bucket_name = "flowstate-audio"

[vars]
ALLOWED_ORIGINS = "https://flow.virzyguns.com,http://localhost:3000,http://localhost:3001"
FULL_TTL_SECONDS = "900"
# Premium access must stay entitlement-gated in every deployment.
PREMIUM_PROMO = "0"

# Secrets: set with `wrangler secret put <NAME>` and never commit values.
#   URL_SIGNING_SECRET - long random HMAC key for stream URLs
#   SUPABASE_URL       - https://<project>.supabase.co
#   SUPABASE_ANON_KEY  - public anon key used with the signed-in user's JWT
# Never store SUPABASE_SERVICE_ROLE_KEY in this Worker. Entitlement reads use
# the user's JWT and the flowstate_profiles RLS policy.
